<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>New Tab</title>
  <link rel="stylesheet" href="css/newtab.css">
</head>
<body>

  <div class="app">

    <aside class="side">
      <div class="side-logo">
        <span class="logo-tile" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 4h10a1 1 0 0 1 1 1v14l-6-3.4L6 19V5a1 1 0 0 1 1-1Z"/></svg>
        </span>
        <span class="logo-word">stacknest</span>
      </div>

      <nav class="side-sec" aria-label="Views">
        <div class="side-label">BROWSE</div>
        <button class="navx view-link is-active" id="nav-collections" data-view="board">
          <span class="nav-dot" style="background: var(--accent)"></span>Collections
          <span class="nav-count" id="nav-collections-count"></span>
        </button>
        <button class="navx view-link" id="nav-library" data-view="library">
          <span class="nav-dot" style="background: #f59e0b"></span>Library
        </button>
        <button class="navx view-link" id="nav-tags" data-view="tags">
          <span class="nav-dot" style="background: #14b8a6"></span>Tags
          <span class="nav-count" id="nav-tags-count"></span>
        </button>
        <button class="navx view-link" id="nav-duplicates" data-view="duplicates">
          <span class="nav-dot" style="background: #f43f5e"></span>Duplicates
          <span class="nav-count" id="nav-duplicates-count"></span>
        </button>
      </nav>

      <div class="side-sec" aria-label="Spaces">
        <div class="side-label-row">
          <div class="side-label">SPACES</div>
          <button class="icb" id="new-space-btn" title="New space" aria-label="New space">
            <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
          </button>
        </div>
        <div id="spaces-nav"></div>
      </div>

      <div class="side-sec" aria-label="Open windows">
        <div class="side-label">WINDOWS</div>
        <div id="windows-root"></div>
      </div>

      <div class="side-sec side-sec-grow" aria-label="Collections list">
        <div class="side-label-row">
          <div class="side-label">COLLECTIONS</div>
          <div class="label-acts">
            <button class="icb" id="export-all-btn" title="Export all collections (bookmarks .html)" aria-label="Export all collections">
              <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v11m0 0 4-4m-4 4-4-4"/><path d="M5 19h14"/></svg>
            </button>
            <button class="icb" id="new-collection-btn" title="New collection" aria-label="New collection">
              <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
            </button>
          </div>
        </div>
        <div id="collections-nav"></div>
      </div>

      <div class="side-sec side-settings">
        <button class="navx view-link" id="nav-settings" data-view="settings">
          <span class="nav-ic" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V15z"/></svg>
          </span>Settings
        </button>
      </div>

      <footer class="side-foot">
        <span class="foot-tile" aria-hidden="true">SN</span>
        <div class="foot-meta">
          <div class="foot-name">StackNest</div>
          <div class="foot-sub" id="side-stats"></div>
        </div>
      </footer>
    </aside>

    <div class="main">
      <header class="top">
        <h1 class="view-title" id="view-title">Collections</h1>

        <label class="searchbox" for="search">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.2-3.2"/></svg>
          <input id="search" type="text" autocomplete="off" spellcheck="false"
                 placeholder="Search tabs, collections…" aria-label="Search tabs, collections and bookmarks">
          <span class="kbd-pair" aria-hidden="true"><kbd>⌘</kbd><kbd>K</kbd></span>
        </label>

        <div class="ticker" id="ticker" hidden aria-label="Market prices"></div>

        <div class="top-actions">
          <div class="theme-seg viewmode-seg" id="viewmode-seg" role="group" aria-label="Board layout">
            <button class="chipx" id="view-columns" title="Column layout" aria-label="Column layout">
              <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="5" width="6" height="14" rx="1.2"/><rect x="14" y="5" width="6" height="14" rx="1.2"/></svg>
            </button>
            <button class="chipx" id="view-tiles" title="Tile layout" aria-label="Tile layout">
              <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="7" height="7" rx="1.4"/><rect x="13" y="4" width="7" height="7" rx="1.4"/><rect x="4" y="13" width="7" height="7" rx="1.4"/><rect x="13" y="13" width="7" height="7" rx="1.4"/></svg>
            </button>
          </div>
          <div class="theme-seg" role="group" aria-label="Theme">
            <button class="chipx" id="theme-light" title="Light theme" aria-label="Light theme">
              <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.4 1.4M17.6 17.6 19 19M19 5l-1.4 1.4M6.4 17.6 5 19"/></svg>
            </button>
            <button class="chipx" id="theme-dark" title="Dark theme" aria-label="Dark theme">
              <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M20 14.5A8 8 0 0 1 9.5 4 7 7 0 1 0 20 14.5Z"/></svg>
            </button>
          </div>
          <button class="btnx primary" id="stash-window-btn" title="Save this window's tabs to a collection and close them — frees memory">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v10m0 0 3.5-3.5M12 13l-3.5-3.5"/><path d="M4 15v3a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-3"/></svg>
            Stash window
          </button>
        </div>
      </header>

      <div class="mini-nav" aria-hidden="true">
        <button class="chipx view-link is-active" data-view="board">Collections</button>
        <button class="chipx view-link" data-view="library">Library</button>
        <button class="chipx view-link" data-view="tags">Tags</button>
        <button class="chipx view-link" data-view="duplicates">Duplicates</button>
        <button class="chipx view-link" data-view="settings">Settings</button>
      </div>

      <div class="tray">
        <div class="tray-live">
          <span class="pulse" aria-hidden="true"><span></span><span></span></span>
          <span class="tray-count" id="tray-count">0 open tabs</span>
        </div>
        <div class="tray-chips" id="tray-root"></div>
        <button class="btnx soft" id="save-all-btn" title="Save this window's tabs to a collection (keeps them open)">Save all →</button>
      </div>

      <section class="view view-board" id="view-board">
        <div class="board" id="board-root"></div>
      </section>

      <section class="view view-library" id="view-library" hidden>
        <div class="library" id="bookmarks-root"></div>
      </section>

      <section class="view view-tags" id="view-tags" hidden>
        <div class="tagsview" id="tags-root"></div>
      </section>

      <section class="view view-duplicates" id="view-duplicates" hidden>
        <div class="duplicates" id="duplicates-root"></div>
      </section>

      <section class="view view-settings" id="view-settings" hidden>
        <div class="settings" id="settings-root"></div>
      </section>
    </div>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>
  <div id="undo-bar" class="undo-bar" role="status" aria-live="polite" hidden></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
